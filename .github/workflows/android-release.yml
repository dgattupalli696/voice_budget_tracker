name: Android release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). If empty, uses auto-generated v-YYYYMMDD-HHMMSS.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK (sideload-signed)
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v-$(date -u +%Y%m%d-%H%M%S)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Stage release artifact
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/voice-budget-tracker-${{ steps.tag.outputs.tag }}.apk"
          ls -la release

      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git tag --sort=-creatordate | grep -v "^${{ steps.tag.outputs.tag }}$" | head -n1 || true)
          {
            echo "notes<<EOF"
            echo "### Voice Budget Tracker ${{ steps.tag.outputs.tag }}"
            echo ""
            echo "Debug-signed APK for sideload. Uninstall any prior version first (debug keystore rotates per build)."
            echo ""
            echo "### Changes"
            if [[ -n "$PREV" ]]; then
              git log --pretty='* %s (%h)' "${PREV}..HEAD" 2>/dev/null || git log --pretty='* %s (%h)' -n 20
            else
              git log --pretty='* %s (%h)' -n 20
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Voice Budget Tracker ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: release/*.apk
